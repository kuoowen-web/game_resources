<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Resource Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <header>
        <h1>Game Resource Tracker</h1>
        <nav>
            <button id="nav-overview" class="nav-btn active">總覽</button>
            <button id="nav-compare" class="nav-btn">比較</button>
            <button id="nav-chart" class="nav-btn">趨勢</button>
            <button id="nav-cashflow" class="nav-btn">現金流</button>
        </nav>
    </header>
    <main>
        <!-- Overview View -->
        <section id="view-overview">
            <div class="toolbar">
                <select id="snapshot-select"><option value="">選擇 Snapshot...</option></select>
                <div class="currency-toggle">
                    <button class="cur-btn active" data-mode="original">原幣</button>
                    <button class="cur-btn" data-mode="twd">TWD</button>
                    <button class="cur-btn" data-mode="usd">USD</button>
                </div>
                <button id="btn-new-snapshot">+ 新增 Snapshot</button>
                <button id="btn-calculate">計算市值</button>
                <button id="btn-save-snapshot" disabled>儲存</button>
            </div>
            <div id="snapshot-content"></div>
            <div id="snapshot-totals"></div>
        </section>

        <!-- Compare View -->
        <section id="view-compare" style="display:none">
            <div class="toolbar">
                <select id="compare-a"><option value="">Snapshot A...</option></select>
                <select id="compare-b"><option value="">Snapshot B...</option></select>
                <div class="currency-toggle">
                    <button class="compare-cur-btn active" data-mode="original">原幣</button>
                    <button class="compare-cur-btn" data-mode="twd">TWD</button>
                    <button class="compare-cur-btn" data-mode="usd">USD</button>
                </div>
            </div>
            <div id="compare-strategies" style="display:none"></div>
            <div class="toolbar">
                <button id="btn-compare">比較</button>
            </div>
            <div id="compare-content"></div>
            <div id="compare-grand-total"></div>
        </section>

        <!-- Cashflow View -->
        <section id="view-cashflow" style="display:none">
            <div class="toolbar">
                <h2 style="margin:0">現金流事件</h2>
                <button id="btn-add-cashflow">+ 新增事件</button>
            </div>
            <div id="cashflow-list"></div>
        </section>

        <!-- Chart View -->
        <section id="view-chart" style="display:none">
            <div class="toolbar">
                <div class="currency-toggle">
                    <button class="chart-cur-btn active" data-mode="twd">TWD</button>
                    <button class="chart-cur-btn" data-mode="usd">USD</button>
                    <button class="chart-cur-btn" data-mode="original">原幣</button>
                </div>
            </div>
            <canvas id="trend-chart"></canvas>
        </section>
    </main>

    <!-- New Snapshot Modal (date/note/rate only) -->
    <div id="new-modal" class="modal" style="display:none">
        <div class="modal-content" style="max-width:400px">
            <div class="modal-header">
                <h2>新增 Snapshot</h2>
                <button id="new-modal-close">&times;</button>
            </div>
            <div id="new-modal-body" style="padding:1rem">
                <div class="form-group"><label>日期</label><input id="new-date" type="date"></div>
                <div class="form-group"><label>備註</label><input id="new-note" type="text" placeholder="Q1 整理..."></div>
                <div class="form-group"><label>USD/TWD 匯率</label><input id="new-rate" type="number" step="0.1" value="32"></div>
                <div class="form-group">
                    <label><input type="checkbox" id="new-copy-existing"> 複製目前 Snapshot 的資產資料</label>
                </div>
            </div>
            <div class="modal-footer">
                <button id="new-modal-save">建立</button>
                <button id="new-modal-cancel">取消</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
